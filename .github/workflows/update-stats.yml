name: Update Profile Stats

on:
  schedule:
    - cron: '0 0 * * *'   # كل يوم منتصف الليل
  push:
    branches: [main]
  workflow_dispatch:       # تشغيل يدوي من GitHub

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install node-fetch@3

      - name: Generate SVGs
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GH_USERNAME: izukuX2
        run: node scripts/generate-svgs.js

      - name: Commit & Push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add banner.svg projects.svg social.svg
          git diff --staged --quiet || git commit -m "chore: update profile stats [skip ci]"
          git push
